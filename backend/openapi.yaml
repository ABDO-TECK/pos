openapi: 3.0.0
info:
  title: ABDO-TECK POS API
  description: OpenAPI definitions for the ABDO-TECK POS System.
  version: 1.0.0
servers:
  - url: http://localhost/pos/backend/api
    description: Local development server
paths:
  /login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@admin.com
                password:
                  type: string
                  example: password
      responses:
        '200':
          description: Login successful
        '401':
          description: Unauthorized
  /csrf-cookie:
    get:
      summary: Fetch CSRF cookie
      responses:
        '200':
          description: CSRF cookie set
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: A list of products
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
